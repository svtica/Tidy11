name: Lint PowerShell

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '.github/workflows/lint.yml'
      - 'PSScriptAnalyzerSettings.psd1'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
  workflow_dispatch:

jobs:
  pssa:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          }
          Import-Module PSScriptAnalyzer
          (Get-Module PSScriptAnalyzer).Version

      - name: Run analyzer
        shell: pwsh
        run: |
          $settings = Join-Path $PWD 'PSScriptAnalyzerSettings.psd1'
          if (Test-Path $settings) {
              Write-Host "Using custom settings file: $settings"
              $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings $settings
          } else {
              $results = Invoke-ScriptAnalyzer -Path . -Recurse
          }

          if ($results) {
              $results | Format-Table -AutoSize | Out-String | Write-Host
              $errors   = @($results | Where-Object Severity -eq 'Error')
              $warnings = @($results | Where-Object Severity -eq 'Warning')
              $infos    = @($results | Where-Object Severity -eq 'Information')

              Write-Host ""
              Write-Host ("Errors:       {0}" -f $errors.Count)
              Write-Host ("Warnings:     {0}" -f $warnings.Count)
              Write-Host ("Information:  {0}" -f $infos.Count)

              # Annotate findings as GitHub Actions warnings/errors so they show in the PR UI
              foreach ($r in $results) {
                  $level = switch ($r.Severity) {
                      'Error'       { 'error' }
                      'Warning'     { 'warning' }
                      'Information' { 'notice' }
                      default       { 'notice' }
                  }
                  $file = $r.ScriptPath -replace [regex]::Escape($PWD.Path + [IO.Path]::DirectorySeparatorChar), ''
                  Write-Host ("::{0} file={1},line={2},col={3},title={4}::{5}" -f `
                      $level, $file, $r.Line, $r.Column, $r.RuleName, $r.Message)
              }

              if ($errors.Count -gt 0) {
                  Write-Host ""
                  Write-Error "PSScriptAnalyzer reported $($errors.Count) error(s). Failing the build."
                  exit 1
              }
          } else {
              Write-Host "PSScriptAnalyzer: no findings. Clean."
          }

  syntax:
    name: PowerShell parse check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse all .ps1 / .psm1 with the PowerShell tokenizer
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Include *.ps1, *.psm1 -File |
                   Where-Object { $_.FullName -notmatch '\\(\.git|node_modules|docs)\\' }

          $failed = @()
          foreach ($f in $files) {
              $tokens = $null
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $f.FullName, [ref]$tokens, [ref]$errors) | Out-Null

              if ($errors -and $errors.Count -gt 0) {
                  $failed += [pscustomobject]@{
                      File   = $f.FullName.Substring($PWD.Path.Length + 1)
                      Errors = $errors.Count
                      First  = $errors[0].Message
                  }
                  foreach ($e in $errors) {
                      Write-Host ("::error file={0},line={1},col={2}::{3}" -f `
                          $f.FullName.Substring($PWD.Path.Length + 1),
                          $e.Extent.StartLineNumber,
                          $e.Extent.StartColumnNumber,
                          $e.Message)
                  }
              } else {
                  Write-Host ("OK  {0}" -f $f.FullName.Substring($PWD.Path.Length + 1))
              }
          }

          if ($failed.Count -gt 0) {
              Write-Host ""
              $failed | Format-Table -AutoSize | Out-String | Write-Host
              Write-Error "Parse errors in $($failed.Count) file(s)."
              exit 1
          }
          Write-Host ""
          Write-Host ("Parsed {0} file(s) cleanly." -f $files.Count)
